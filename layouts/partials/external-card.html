{{ $cover := "" }}
{{ with (.Resources.ByType "image").GetMatch "*cover*" }}
  {{ $cover = .Filter (slice images.AutoOrient (images.Process "fit 600x600")) }}
{{ end }}
{{ $url := .Params.external_url | default .RelPermalink }}
<a class="card" href="{{ $url }}" title="{{ .Title }}"
   {{ if .Params.external_url }}target="_blank" rel="noopener"{{ end }}>
  <figure style="background-color: {{ with $cover }}{{ index .Colors 0 }}{{ else }}var(--bg){{ end }}; position: relative;">
    {{ with $cover }}
      <img class="lazyload" width="{{ .Width }}" height="{{ .Height }}" data-src="{{ .RelPermalink }}" alt="{{ $.Title }}" />
    {{ else }}
      <span style="font-size: 3rem; display: flex; align-items: center; justify-content: center; height: 100%;">📄</span>
    {{ end }}
    {{ if .Params.external_url }}
      <svg style="position: absolute; bottom: 8px; right: 8px; width: 20px; height: 20px; background: rgba(0,0,0,0.6); border-radius: 4px; padding: 3px; fill: white;" viewBox="0 0 24 24">
        <path d="M21 13v10h-21v-19h12v2h-10v15h17v-8h2zm3-12h-9.988l4.366 4.366-9.314 9.314 2.121 2.121 9.314-9.314 4.501 4.5v-9.987z"/>
      </svg>
    {{ end }}
  </figure>
  <div>
    <h2>{{ .Title }}</h2>
    {{ with .Description }}<p>{{ . }}</p>{{ end }}
  </div>
</a>
