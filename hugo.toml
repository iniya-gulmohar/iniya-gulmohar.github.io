baseURL = 'https://kaanal.space/'
locale = 'en-us'
title = 'Kaanal'

theme = 'gallery'
publishDir = "docs"

[params]
  title = "Kaanal"
  description = "Need to be set"
  defaultTheme = "dark"
  [params.author]
    email = "maithreyi.ram@gmail.com"
    name = "Maithreyi"
  [params.socialIcons]
    # facebook = "https://www.facebook.com/"
    instagram = "https://www.instagram.com/coffeee_creates"
    # github = "https://github.com/nicokaiser/hugo-theme-gallery/"
    # youtube = "https://www.youtube.com/"
    email = "mailto:maithreyi.ram@gmail.com"
    #website = "https://example.com"
    #mastodon = "https://example.com"
    #pixelfed = "https://example.com"
    #mixcloud = "https://example.com"
    #flickr = "https://www.flickr.com"
    #500px = "https://500px"
    #whatsapp = "1234567890"
  [params.gallery]
    #boxSpacing = 10
    #targetRowHeight = 288
    #targetRowHeightTolerance = 0.25

[outputs]
  home = ["HTML", "RSS"]
  page = ["HTML"]
  section = ["HTML"]

[imaging]
  quality = 75
  resampleFilter = "CatmullRom"
  [imaging.exif]
    disableDate = false
    disableLatLong = true
    includeFields = "ImageDescription|Orientation"

[menu]
  [[menu.footer]]
    name = "Kaanal 2026"
    weight = 1

[services]
  [services.rss]
    limit = 100
